# Slack app manifest for n8n Backoffice.
#
# Use it in EITHER of two ways:
#   A) New app:  api.slack.com/apps → Create New App → "From a manifest" → paste this.
#   B) Existing app: App settings → "App Manifest" → paste + save. This adds the
#      bot user + scopes (fixes "this app doesn't have a bot user to install").
#
# After creating/updating: OAuth & Permissions → Install to Workspace, OR just
# hit http://localhost:3000/api/slack/install once the redirect URL below is set.
#
# Interactivity is disabled here because Slack requires a PUBLIC https URL for it.
# After deploying (e.g. Vercel), set is_enabled: true and request_url to
# https://<your-domain>/api/slack/interactivity, then reinstall.

display_information:
  name: n8n Otto
  description: Your n8n automation coworker — @mention to ask about the estate, owners, and blast radius, and to take action.
  background_color: "#ea4b71"

features:
  bot_user:
    # display_name allows only a-z 0-9 - _ .  (no spaces, no uppercase)
    display_name: n8n-otto
    always_online: true
  # App Home: enable the Messages tab so users can DM Otto directly. Without this
  # the Messages tab shows Slack's default "still a work in progress" placeholder.
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  redirect_urls:
    - https://n8n-backoffice.vercel.app/api/slack/oauth
    - http://localhost:3000/api/slack/oauth
  scopes:
    bot:
      - channels:read
      - groups:read
      - chat:write
      # Otto coworker: read @mentions, read the thread it's tagged in, react.
      - app_mentions:read
      - channels:history
      - groups:history
      - reactions:write
      # DMs: read incoming direct messages so Otto can answer them. chat:write
      # (above) covers posting the reply back.
      - im:history
      - im:read

settings:
  event_subscriptions:
    # Otto's inbound endpoint. Slack verifies this URL once (url_verification).
    request_url: https://n8n-backoffice.vercel.app/api/slack/events
    bot_events:
      - app_mention
      # Deliver 1-on-1 DMs to the same endpoint (parseSlackEvent -> kind "dm").
      - message.im
  interactivity:
    is_enabled: true
    request_url: https://n8n-backoffice.vercel.app/api/slack/interactivity
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
